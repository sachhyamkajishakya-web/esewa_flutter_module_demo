name: esewa_flutter_module
description: "A new Flutter module project."

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  get_it: ^9.2.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  injectable: ^2.7.1+4
  flutter_bloc: ^9.1.1
  dio_network_interceptor: ^1.0.0
  dartz: ^0.10.1
  flutter_localizations:
    sdk: flutter
  intl: any
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  logger: ^2.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.12.1
  json_serializable: ^6.13.0
  injectable_generator: ^2.12.1
  freezed: ^3.2.5

flutter:
  uses-material-design: true
  generate: true

  module:
    androidX: true
    androidPackage: com.example.esewa_flutter_module
    iosBundleIdentifier: com.example.esewaFlutterModule
